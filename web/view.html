<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>View</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 16px; }
      .box { padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
      code { background: #f2f2f2; padding: 2px 4px; border-radius: 4px; }
      img { width: 100%; max-width: 720px; border: 1px solid #ddd; border-radius: 8px; margin-top: 12px; }
      .small { color: #666; font-size: 12px; }
    </style>
  </head>
  <body>
    <h2>Viewer</h2>
    <div class="box">
      <div>Stream: <code id="stream"></code></div>
      <div>Your npub: <code id="npub"></code></div>
      <div>Status: <span id="status">starting…</span></div>
      <div class="small">This page auto-generates a nostr keypair (stored in localStorage) and auto-requests access.</div>
    </div>

    <img id="img" />

    <script type="module">
      import { TAG_DEMO, ADMIN_PUB_HEX } from './config.js';
      import { blobFetch } from './blob.js';
      import { aesGcmDecrypt, b64decode, utf8Bytes, sha256Bytes, b64encode } from './crypto.js';
      import { deriveChunkKey } from './deriveChunkKey.js';
      import { createMember } from './mls.js';
      import {
        getStreamId,
        getOrCreateViewerKeypair,
        publish,
        sub,
        nip17WrapJson,
        nip17UnwrapJson,
      } from './util.js';

      const streamId = getStreamId();
      document.querySelector('#stream').textContent = streamId;

      const viewer = getOrCreateViewerKeypair('demo.viewer.sk');
      document.querySelector('#npub').textContent = viewer.npub;

      const statusEl = document.querySelector('#status');
      const imgEl = document.querySelector('#img');

      // MLS state
      const { member: mls, kind: mlsKind, persist: persistMls } = await createMember(
        `${streamId}:viewer:${viewer.pk}`,
        `mls.member.viewer.${streamId}.${viewer.pk}`
      );
      let exporterSecretB64 = null;

      // frameId -> { blobHash, mime }
      const announced = new Map();
      // legacy frameId -> keyB64 (fallback/dummy)
      const legacyKeys = new Map();

      function setStatus(s) { statusEl.textContent = s; }

      async function refreshExporterSecret() {
        try {
          const ctxB64 = b64encode(utf8Bytes(streamId));
          exporterSecretB64 = mls.export_secret('blossom-fire-demo', ctxB64, 32);
          persistMls();
          setStatus(`MLS ready (${mlsKind}) epoch=${mls.group_epoch()}`);
        } catch {
          exporterSecretB64 = null;
        }
      }

      // Auto-request access (NIP-17 join request → admin)
      try {
        const kp = mls.create_key_package();
        const req = nip17WrapJson(viewer.sk, ADMIN_PUB_HEX, {
          type: 'mls_join',
          streamId,
          role: 'viewer',
          kp,
          v: 1,
        });
        await publish(req);
      } catch (e) {
        console.warn('mls join request failed', e);
      }
      setStatus('requested access; waiting for MLS welcome…');

      // Subscribe to frame announcements
      sub([
        { kinds: [1], '#t': [TAG_DEMO], '#d': [streamId], limit: 50 }
      ], async (ev) => {
        try {
          const frameIdTag = ev.tags.find(t => t[0]==='i');
          const blobTag = ev.tags.find(t => t[0]==='x');
          const mimeTag = ev.tags.find(t => t[0]==='m');
          if (!frameIdTag || !blobTag) return;

          const frameId = Number(frameIdTag[1]);
          const blobHash = blobTag[1];
          const mime = (mimeTag && mimeTag[1]) || 'image/webp';

          announced.set(frameId, { blobHash, mime });
          await tryRender(frameId);
        } catch (e) {
          console.error(e);
        }
      });

      // Subscribe to NIP-17 control-plane messages addressed to this viewer
      sub([
        { kinds: [1059], '#p': [viewer.pk], limit: 200 }
      ], async (ev) => {
        try {
          const { inner, msg } = nip17UnwrapJson(viewer.sk, ev);
          if (!msg || msg.streamId !== streamId) return;
          // Only accept MLS control-plane from admin.
          if (inner.pubkey !== ADMIN_PUB_HEX) return;

          if (msg.type === 'mls_welcome') {
            mls.process_welcome(msg.welcome, msg.commit);
            await refreshExporterSecret();
          } else if (msg.type === 'mls_commit') {
            mls.process_commit(msg.commit);
            await refreshExporterSecret();
          } else if (msg.k && msg.frameId != null) {
            // legacy per-frame key (fallback)
            legacyKeys.set(Number(msg.frameId), msg.k);
            await tryRender(Number(msg.frameId));
          }
        } catch {
          // ignore
        }
      });

      await refreshExporterSecret();

      async function tryRender(frameId) {
        const a = announced.get(frameId);
        if (!a) return;

        const payload = await blobFetch(a.blobHash);
        const iv = payload.slice(0, 12);
        const ct = payload.slice(12);
        const aad = await sha256Bytes(utf8Bytes(`${streamId}:${frameId}`));

        let keyBytes = null;
        if (exporterSecretB64) {
          keyBytes = await deriveChunkKey(exporterSecretB64, streamId, frameId);
        } else if (legacyKeys.has(frameId)) {
          keyBytes = b64decode(legacyKeys.get(frameId));
        } else {
          return;
        }

        try {
          const pt = await aesGcmDecrypt(keyBytes, iv, ct, { aadBytes: aad });
          const blob = new Blob([pt], { type: a.mime });
          imgEl.src = URL.createObjectURL(blob);
        } catch (e) {
          setStatus('have blob but not allowed (or wrong epoch)');
        }
      }

      setStatus('requested access; waiting…');
    </script>
  </body>
</html>
