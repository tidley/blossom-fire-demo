<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Broadcast</title>
    <style>
      :root { color-scheme: dark; }
      body { font-family: system-ui, sans-serif; margin: 16px; background: #0b0e14; color: #e6edf3; }
      .box { padding: 12px; border: 1px solid #2f3540; border-radius: 8px; background: #111826; }
      .row { display: flex; gap: 16px; flex-wrap: wrap; }
      .grid { display: grid; grid-template-columns: 1fr 420px; gap: 16px; align-items: start; }
      @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }
      code { background: #1a2233; color: #d2e0ff; padding: 2px 4px; border-radius: 4px; }
      a { color: #7ab8ff; }
      .small { color: #9aa7bd; font-size: 12px; }
      button, input { font-size: 16px; background: #1a2233; color: #e6edf3; border: 1px solid #3a4354; border-radius: 6px; }
      button { padding: 6px 10px; cursor: pointer; }
      video, canvas, img { max-width: 100%; border: 1px solid #2f3540; border-radius: 8px; background: #000; }
      .viewer { display: flex; justify-content: space-between; align-items: center; gap: 8px; padding: 8px; border-bottom: 1px solid #253043; }
          .titlebar { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:10px; }
      .stream-jump { display:flex; align-items:center; gap:8px; }
      .stream-jump input { width: 140px; padding: 6px 8px; }
      .stream-jump button { padding: 6px 10px; }
    </style>
  </head>
  <body>
    <div class="titlebar">
    <h2>Broadcast (camera → encrypted slideshow)</h2>
    <div class="stream-jump">
      <input id="streamJump" type="text" placeholder="stream id" />
      <button id="goStream" type="button">Go</button>
    </div>
  </div>
    <div class="box">
      <div>Stream: <code id="stream"></code></div>
      <div>Broadcaster npub: <code id="npub"></code></div>
      <div>Status: <span id="status">idle</span></div>
      <div style="margin-top:10px;">
        <label>FPS (frames/sec): <input id="fps" type="number" value="1" min="0.2" step="0.2" style="width:80px;"></label>
        <button id="start">Start</button>
        <button id="stop" disabled>Stop</button>
      </div>
    </div>

    <div class="row" style="margin-top:16px;">
      <div>
        <div>Camera preview</div>
        <video id="vid" autoplay playsinline muted></video>
      </div>
      <div>
        <div>Last frame (plaintext)</div>
        <canvas id="cv"></canvas>
      </div>
    </div>

    <script type="module">
      import { TAG_DEMO, ADMIN_SK_HEX } from './config.js';
      import { blobUpload } from './blob.js';
      import { aesGcmEncrypt, randKey32, utf8Bytes, b64encode } from './crypto.js';
      import { getStreamId, getOrCreateViewerKeypair, makeSignedEventUnsigned, publish, nip17WrapJson, skFromHex, pubkeyFromSk, npubFromPubkey } from './util.js';

      const streamId = getStreamId();
      document.querySelector('#stream').textContent = streamId;

      const streamJumpEl = document.querySelector('#streamJump');
      const goStreamEl = document.querySelector('#goStream');
      if (streamJumpEl && goStreamEl) {
        streamJumpEl.value = streamId;
        const go = () => {
          const next = (streamJumpEl.value || '').trim();
          if (!next) return;
          const u = new URL(location.href);
          u.searchParams.set('stream', next);
          location.href = u.toString();
        };
        goStreamEl.onclick = go;
        streamJumpEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') go(); });
      }


      // Broadcaster identity (stored locally)
      const broadcaster = getOrCreateViewerKeypair('demo.broadcaster.sk');
      document.querySelector('#npub').textContent = broadcaster.npub;

      // Admin identity is hardcoded for now (same across admin/broadcast)
      const adminSk = skFromHex(ADMIN_SK_HEX);
      const adminPub = pubkeyFromSk(adminSk);

      const statusEl = document.querySelector('#status');
      const vid = document.querySelector('#vid');
      const cv = document.querySelector('#cv');
      const fpsEl = document.querySelector('#fps');
      const startBtn = document.querySelector('#start');
      const stopBtn = document.querySelector('#stop');

      let running = false;
      let frameId = 0;
      let timer = null;
      let mediaStream = null;

      function setStatus(s) { statusEl.textContent = s; }

      async function setupCamera() {
        mediaStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
        vid.srcObject = mediaStream;
        await vid.play();
      }

      async function captureToCanvas() {
        const w = Math.min(640, vid.videoWidth || 640);
        const h = Math.round(w * ((vid.videoHeight || 480) / (vid.videoWidth || 640)));
        cv.width = w; cv.height = h;
        const ctx = cv.getContext('2d');
        ctx.drawImage(vid, 0, 0, w, h);
        const blob = await new Promise((resolve) => cv.toBlob(resolve, 'image/webp', 0.72));
        const buf = await blob.arrayBuffer();
        return new Uint8Array(buf);
      }

      async function tick() {
        if (!running) return;
        try {
          const plaintext = await captureToCanvas();
          const key = randKey32();

          const aad = utf8Bytes(`${streamId}:${frameId}`);
          const { iv, ciphertext } = await aesGcmEncrypt(key, plaintext, { aadBytes: aad });

          // upload payload: iv || ciphertext
          const payload = new Uint8Array(iv.length + ciphertext.length);
          payload.set(iv, 0);
          payload.set(ciphertext, iv.length);

          const hash = await blobUpload(payload);

          // public frame announcement
          const ann = makeSignedEventUnsigned(1, broadcaster.sk, {
            content: '',
            tags: [
              ['t', TAG_DEMO],
              ['d', streamId],
              ['i', String(frameId)],
              ['x', hash],
              ['m', 'image/webp'],
            ]
          });
          await publish(ann);

          // send key to admin via NIP-17 gift-wrap (kind 1059)
          const dm = await nip17WrapJson(broadcaster.sk, adminPub, {
            type: 'adminkey',
            streamId,
            frameId,
            x: hash,
            k: b64encode(key),
            key_id: `frame-${frameId}`,
            m: 'image/webp',
            alg: 'aes-gcm',
            v: 1,
          });
          await publish(dm);

          setStatus(`sent frame ${frameId} → ${hash.slice(0, 8)}…`);
          frameId++;
        } catch (e) {
          console.error(e);
          setStatus(`error: ${e.message || e}`);
        }
      }

      startBtn.onclick = async () => {
        if (running) return;
        running = true;
        startBtn.disabled = true;
        stopBtn.disabled = false;
        setStatus('starting camera…');
        await setupCamera();
        setStatus('running');
        const fps = Math.max(0.2, Number(fpsEl.value || 1));
        const ms = Math.round(1000 / fps);
        timer = setInterval(tick, ms);
        tick();
      };

      stopBtn.onclick = () => {
        running = false;
        startBtn.disabled = false;
        stopBtn.disabled = true;
        if (timer) clearInterval(timer);
        timer = null;
        if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
        mediaStream = null;
        setStatus('stopped');
      };

      setStatus('ready');
    </script>
  </body>
</html>
