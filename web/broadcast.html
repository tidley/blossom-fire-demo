<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Broadcast</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 16px; }
      .row { display: flex; gap: 16px; flex-wrap: wrap; }
      video, canvas, img { max-width: 360px; width: 100%; border: 1px solid #ddd; border-radius: 8px; }
      input, button { font-size: 16px; }
      .box { padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
      code { background: #f2f2f2; padding: 2px 4px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h2>Broadcast (camera → encrypted slideshow)</h2>
    <div class="box">
      <div>Stream: <code id="stream"></code></div>
      <div>Broadcaster npub: <code id="npub"></code></div>
      <div>Status: <span id="status">idle</span></div>
      <div style="margin-top:10px;">
        <label>FPS (frames/sec): <input id="fps" type="number" value="1" min="0.2" step="0.2" style="width:80px;"></label>
        <button id="start">Start</button>
        <button id="stop" disabled>Stop</button>
      </div>
    </div>

    <div class="row" style="margin-top:16px;">
      <div>
        <div>Camera preview</div>
        <video id="vid" autoplay playsinline muted></video>
      </div>
      <div>
        <div>Last frame (plaintext)</div>
        <canvas id="cv"></canvas>
      </div>
    </div>

    <script type="module">
      import { TAG_DEMO, TAG_REQ } from './config.js';
      import { blobUpload } from './blob.js';
      import { aesGcmEncrypt, utf8Bytes, sha256Bytes, b64encode } from './crypto.js';
      import { deriveChunkKey } from './deriveChunkKey.js';
      import { createMember } from './mls.js';
      import { getStreamId, getOrCreateViewerKeypair, makeSignedEventUnsigned, publish, sub, nip44Decrypt } from './util.js';

      const streamId = getStreamId();
      document.querySelector('#stream').textContent = streamId;

      // Broadcaster identity (stored locally)
      const broadcaster = getOrCreateViewerKeypair('demo.broadcaster.sk');
      document.querySelector('#npub').textContent = broadcaster.npub;

      const statusEl = document.querySelector('#status');
      const vid = document.querySelector('#vid');
      const cv = document.querySelector('#cv');
      const fpsEl = document.querySelector('#fps');
      const startBtn = document.querySelector('#start');
      const stopBtn = document.querySelector('#stop');

      let running = false;
      let frameId = 0;
      let timer = null;
      let mediaStream = null;

      // MLS state
      const { member: mls, kind: mlsKind, persist: persistMls } = await createMember(
        `${streamId}:broadcaster`,
        `mls.member.broadcaster.${streamId}`
      );
      let exporterSecretB64 = null;

      function setStatus(s) { statusEl.textContent = s; }

      async function refreshExporterSecret() {
        try {
          // context is streamId bytes
          const ctxB64 = b64encode(utf8Bytes(streamId));
          exporterSecretB64 = mls.export_secret('blossom-fire-demo', ctxB64, 32);
          persistMls();
          setStatus(`MLS ready (${mlsKind}) epoch=${mls.group_epoch()}`);
        } catch {
          exporterSecretB64 = null;
        }
      }

      // Join-request (public) so admin can Welcome us.
      try {
        const kp = mls.create_key_package();
        const req = makeSignedEventUnsigned(1, broadcaster.sk, {
          content: JSON.stringify({ t: 'mls_join', role: 'broadcaster', kp, v: 1 }),
          tags: [ ['t', TAG_REQ], ['d', streamId] ]
        });
        await publish(req);
      } catch (e) {
        console.warn('mls join request failed', e);
      }

      // Listen for MLS welcome/commit DMs.
      sub([
        { kinds: [4], '#p': [broadcaster.pk], '#d': [streamId], limit: 200 }
      ], async (ev) => {
        try {
          const plaintext = nip44Decrypt(broadcaster.sk, ev.pubkey, ev.content);
          const msg = JSON.parse(plaintext);
          if (msg.streamId !== streamId) return;
          if (msg.type === 'mls_welcome') {
            mls.process_welcome(msg.welcome, msg.commit);
            await refreshExporterSecret();
          } else if (msg.type === 'mls_commit') {
            mls.process_commit(msg.commit);
            await refreshExporterSecret();
          }
        } catch {
          // ignore
        }
      });

      await refreshExporterSecret();

      async function setupCamera() {
        mediaStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
        vid.srcObject = mediaStream;
        await vid.play();
      }

      async function captureToCanvas() {
        const w = Math.min(640, vid.videoWidth || 640);
        const h = Math.round(w * ((vid.videoHeight || 480) / (vid.videoWidth || 640)));
        cv.width = w; cv.height = h;
        const ctx = cv.getContext('2d');
        ctx.drawImage(vid, 0, 0, w, h);
        const blob = await new Promise((resolve) => cv.toBlob(resolve, 'image/webp', 0.72));
        const buf = await blob.arrayBuffer();
        return new Uint8Array(buf);
      }

      async function tick() {
        if (!running) return;
        try {
          if (!exporterSecretB64) {
            setStatus('waiting for MLS welcome/commit from admin…');
            return;
          }

          const plaintext = await captureToCanvas();
          const key = await deriveChunkKey(exporterSecretB64, streamId, frameId);

          // fixed 32-byte AAD = SHA-256(streamId:frameId)
          const aad = await sha256Bytes(utf8Bytes(`${streamId}:${frameId}`));
          const { iv, ciphertext } = await aesGcmEncrypt(key, plaintext, { aadBytes: aad });

          // upload payload: iv || ciphertext
          const payload = new Uint8Array(iv.length + ciphertext.length);
          payload.set(iv, 0);
          payload.set(ciphertext, iv.length);

          const hash = await blobUpload(payload);

          // public frame announcement
          const ann = makeSignedEventUnsigned(1, broadcaster.sk, {
            content: '',
            tags: [
              ['t', TAG_DEMO],
              ['d', streamId],
              ['i', String(frameId)],
              ['x', hash],
              ['m', 'image/webp'],
              ['e', String(mls.group_epoch())],
            ]
          });
          await publish(ann);

          setStatus(`sent frame ${frameId} (epoch ${mls.group_epoch()}) → ${hash.slice(0, 8)}…`);
          frameId++;
        } catch (e) {
          console.error(e);
          setStatus(`error: ${e.message || e}`);
        }
      }

      startBtn.onclick = async () => {
        if (running) return;
        running = true;
        startBtn.disabled = true;
        stopBtn.disabled = false;
        setStatus('starting camera…');
        await setupCamera();
        setStatus('running');
        const fps = Math.max(0.2, Number(fpsEl.value || 1));
        const ms = Math.round(1000 / fps);
        timer = setInterval(tick, ms);
        tick();
      };

      stopBtn.onclick = () => {
        running = false;
        startBtn.disabled = false;
        stopBtn.disabled = true;
        if (timer) clearInterval(timer);
        timer = null;
        if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
        mediaStream = null;
        setStatus('stopped');
      };

      setStatus(`ready (MLS=${mlsKind}; epoch=${mls.group_epoch()})`);
    </script>
  </body>
</html>
