<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Broadcast Video</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 16px; }
      .row { display: flex; gap: 16px; flex-wrap: wrap; }
      video { max-width: 520px; width: 100%; border: 1px solid #ddd; border-radius: 8px; }
      input, button { font-size: 16px; }
      .box { padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
      code { background: #f2f2f2; padding: 2px 4px; border-radius: 4px; }
      .small { color: #666; font-size: 12px; }
    </style>
  </head>
  <body>
    <h2>Broadcast (near-live video chunks → encrypted)</h2>

    <div class="box">
      <div>Stream: <code id="stream"></code></div>
      <div>Broadcaster npub: <code id="npub"></code></div>
      <div>Status: <span id="status">idle</span></div>
      <div class="small" id="mime"></div>
      <div style="margin-top:10px;">
        <label>Chunk ms: <input id="ms" type="number" value="1000" min="250" step="250" style="width:100px;"></label>
        <button id="start">Start</button>
        <button id="stop" disabled>Stop</button>
      </div>
    </div>

    <div class="row" style="margin-top:16px;">
      <div>
        <div>Camera preview</div>
        <video id="vid" autoplay playsinline muted></video>
      </div>
    </div>

    <script type="module">
      import { TAG_DEMO_VIDEO, ADMIN_PUB_HEX } from './config.js';
      import { blobUpload } from './blob.js';
      import { aesGcmEncrypt, utf8Bytes, b64encode, sha256Bytes } from './crypto.js';
      import { deriveChunkKey } from './deriveChunkKey.js';
      import { createMember } from './mls.js';
      import { getStreamId, getOrCreateViewerKeypair, makeSignedEventUnsigned, publish, sub, nip17WrapJson, nip17UnwrapJson } from './util.js';

      const streamId = getStreamId();
      document.querySelector('#stream').textContent = streamId;

      const broadcaster = getOrCreateViewerKeypair('demo.broadcaster.sk');
      document.querySelector('#npub').textContent = broadcaster.npub;


      const statusEl = document.querySelector('#status');
      const mimeEl = document.querySelector('#mime');
      const vid = document.querySelector('#vid');
      const msEl = document.querySelector('#ms');
      const startBtn = document.querySelector('#start');
      const stopBtn = document.querySelector('#stop');

      let mediaStream = null;
      let recorder = null;
      let chunkId = 0;
      let running = false;
      let chosenMime = null;
      let loopTimer = null;

      function setStatus(s) { statusEl.textContent = s; }

      // MLS state (for deriving per-chunk encryption keys)
      const { member: mls, kind: mlsKind, persist: persistMls } = await createMember(
        `${streamId}:broadcaster-video`,
        `mls.member.broadcaster-video.${streamId}`
      );
      let exporterSecretB64 = null;

      async function refreshExporterSecret() {
        try {
          const ctxB64 = b64encode(utf8Bytes(streamId));
          exporterSecretB64 = mls.export_secret('blossom-fire-demo', ctxB64, 32);
          persistMls();
          setStatus(`MLS ready (${mlsKind}) epoch=${mls.group_epoch()}`);
        } catch {
          exporterSecretB64 = null;
        }
      }

      // NIP-17 join request to admin
      try {
        const kp = mls.create_key_package();
        const req = nip17WrapJson(broadcaster.sk, ADMIN_PUB_HEX, {
          type: 'mls_join',
          streamId,
          role: 'broadcaster-video',
          kp,
          v: 1,
        });
        await publish(req);
      } catch (e) {
        console.warn('mls join request failed', e);
      }

      // Listen for MLS welcome/commit via NIP-17
      sub([
        { kinds: [1059], '#p': [broadcaster.pk], limit: 200 }
      ], async (ev) => {
        try {
          const { inner, msg } = nip17UnwrapJson(broadcaster.sk, ev);
          if (!msg || msg.streamId !== streamId) return;
          if (inner.pubkey !== ADMIN_PUB_HEX) return;
          if (msg.type === 'mls_welcome') {
            mls.process_welcome(msg.welcome, msg.commit);
            await refreshExporterSecret();
          } else if (msg.type === 'mls_commit') {
            mls.process_commit(msg.commit);
            await refreshExporterSecret();
          }
        } catch {
          // ignore
        }
      });

      await refreshExporterSecret();

      async function setupCamera() {
        mediaStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: true });
        vid.srcObject = mediaStream;
        await vid.play();
      }

      function pickMime() {
        const candidates = [
          'video/webm;codecs=vp8,opus',
          'video/webm;codecs=vp9,opus',
          'video/webm',
        ];
        for (const m of candidates) {
          if (window.MediaRecorder && MediaRecorder.isTypeSupported(m)) return m;
        }
        return null;
      }

      async function handleChunk(blob) {
        if (!running) return;
        if (!blob || blob.size === 0) return;
        try {
          if (!exporterSecretB64) {
            setStatus('waiting for MLS welcome/commit from admin…');
            return;
          }

          const buf = await blob.arrayBuffer();
          const plaintext = new Uint8Array(buf);

          const key = await deriveChunkKey(exporterSecretB64, streamId, chunkId);
          const aad = await sha256Bytes(utf8Bytes(`${streamId}:${chunkId}`));
          const { iv, ciphertext } = await aesGcmEncrypt(key, plaintext, { aadBytes: aad });

          const payload = new Uint8Array(iv.length + ciphertext.length);
          payload.set(iv, 0);
          payload.set(ciphertext, iv.length);

          const hash = await blobUpload(payload);

          // public chunk announcement
          const ann = makeSignedEventUnsigned(1, broadcaster.sk, {
            content: '',
            tags: [
              ['t', TAG_DEMO_VIDEO],
              ['d', streamId],
              ['i', String(chunkId)],
              ['x', hash],
              ['m', chosenMime || 'video/webm'],
              ['c', chosenMime || 'video/webm'],
              ['e', String(mls.group_epoch())],
            ]
          });
          await publish(ann);

          setStatus(`sent chunk ${chunkId} → ${hash.slice(0,8)}… (${blob.size} bytes)`);
          chunkId++;
        } catch (e) {
          console.error(e);
          setStatus(`error: ${e.message || e}`);
        }
      }

      async function recordOneChunk(ms) {
        return new Promise((resolve, reject) => {
          try {
            recorder = new MediaRecorder(mediaStream, { mimeType: chosenMime });
          } catch (e) {
            reject(e);
            return;
          }

          let data = null;
          recorder.ondataavailable = (ev) => { data = ev.data; };
          recorder.onerror = (ev) => reject(ev.error || ev);
          recorder.onstop = () => resolve(data);

          recorder.start();
          setTimeout(() => {
            try {
              if (recorder && recorder.state !== 'inactive') recorder.stop();
            } catch (e) {
              reject(e);
            }
          }, ms);
        });
      }

      async function loop() {
        const ms = Math.max(250, Number(msEl.value || 1000));
        while (running) {
          try {
            // Stop/start per chunk so each blob is more self-contained (includes headers/init),
            // which improves MSE playback for viewers who join mid-stream.
            const blob = await recordOneChunk(ms);
            await handleChunk(blob);
          } catch (e) {
            console.error(e);
            setStatus(`error: ${e.message || e}`);
            await new Promise(r => setTimeout(r, 500));
          }
        }
      }

      startBtn.onclick = async () => {
        if (running) return;
        running = true;
        startBtn.disabled = true;
        stopBtn.disabled = false;

        setStatus('starting camera…');
        await setupCamera();

        chosenMime = pickMime();
        if (!chosenMime) {
          setStatus('error: no supported MediaRecorder mimeType (need WebM support)');
          running = false;
          startBtn.disabled = false;
          stopBtn.disabled = true;
          return;
        }
        mimeEl.textContent = `Recorder mimeType: ${chosenMime}`;

        setStatus('recording');
        loop();
      };

      stopBtn.onclick = () => {
        running = false;
        startBtn.disabled = false;
        stopBtn.disabled = true;
        if (recorder && recorder.state !== 'inactive') {
          try { recorder.stop(); } catch {}
        }
        recorder = null;
        if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
        mediaStream = null;
        setStatus('stopped');
      };

      setStatus('ready');
    </script>
  </body>
</html>
