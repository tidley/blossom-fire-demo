<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blossom Fire Demo</title>
    <style>
      :root { color-scheme: dark; }
      body { font-family: system-ui, sans-serif; margin: 0; background: #0b0e14; color: #e6edf3; }
      .wrap { max-width: 860px; margin: 0 auto; padding: 28px 16px; }
      h1 { margin: 0 0 6px; font-size: 28px; }
      p { color: #9aa7bd; margin: 0 0 18px; }
      code { background: #1a2233; color: #d2e0ff; padding: 2px 6px; border-radius: 4px; }
      .card { border: 1px solid #2f3540; border-radius: 10px; background: #111826; padding: 14px; margin: 14px 0; }
      .card h3 { margin: 0 0 10px; font-size: 17px; }
      .btns { display: grid; gap: 10px; }
      .btn {
        display: block;
        text-decoration: none;
        color: #e6edf3;
        background: #1a2233;
        border: 1px solid #3a4354;
        border-radius: 8px;
        padding: 10px 12px;
      }
      .btn:hover { border-color: #7ab8ff; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Blossom Fire</h1>
      <p>Pick a mode. Use <code>?stream=demo1</code> (or your stream id) on each page.</p>

      <section class="card">
        <h3>Frames mode</h3>
        <div class="btns">
          <a class="btn" href="/admin.html?stream=demo1">Admin</a>
          <a class="btn" href="/broadcast.html?stream=demo1">Broadcast Frames</a>
          <a class="btn" href="/view.html?stream=demo1">View Frames</a>
        </div>
      </section>

      <section class="card">
        <h3>Video mode</h3>
        <div class="btns">
          <a class="btn" href="/broadcast-video.html?stream=demo1">Broadcast Video</a>
          <a class="btn" href="/view-video.html?stream=demo1">View Video</a>
        </div>
      </section>
    </div>
  </body>
</html>
