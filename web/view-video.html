<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>View Video</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 16px; }
      .box { padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
      code { background: #f2f2f2; padding: 2px 4px; border-radius: 4px; }
      video { width: 100%; max-width: 900px; border: 1px solid #ddd; border-radius: 8px; margin-top: 12px; }
      .small { color: #666; font-size: 12px; }
    </style>
  </head>
  <body>
    <h2>Viewer (near-live video)</h2>
    <div class="box">
      <div>Stream: <code id="stream"></code></div>
      <div>Your npub: <code id="npub"></code></div>
      <div>Status: <span id="status">starting…</span></div>
      <div class="small">Auto-generates a nostr keypair (localStorage) and auto-requests access.</div>
    </div>

    <video id="v" controls autoplay playsinline muted></video>

    <script type="module">
      import { TAG_DEMO_VIDEO, ADMIN_PUB_HEX } from './config.js';
      import { blobFetch } from './blob.js';
      import { aesGcmDecrypt, utf8Bytes, sha256Bytes, b64encode } from './crypto.js';
      import { deriveChunkKey } from './deriveChunkKey.js';
      import { createMember } from './mls.js';
      import { createPump } from './mse-pump.js';
      import { getStreamId, getOrCreateViewerKeypair, publish, sub, nip17WrapJson, nip17UnwrapJson } from './util.js';

      const streamId = getStreamId();
      document.querySelector('#stream').textContent = streamId;

      const viewer = getOrCreateViewerKeypair('demo.viewer.sk');
      document.querySelector('#npub').textContent = viewer.npub;

      const statusEl = document.querySelector('#status');
      const videoEl = document.querySelector('#v');

      function setStatus(s) { statusEl.textContent = s; }

      // State
      const announced = new Map();  // chunkId -> { blobHash, mime, codec }
      const decrypted = new Map();  // chunkId -> Uint8Array
      let lastRendered = -1;

      let mediaSource = null;
      let sourceBuffer = null;
      let codecStr = null;

      let pump = () => {};

      function ensureMse(codec) {
        if (mediaSource) return;
        codecStr = codec || 'video/webm;codecs=vp8,opus';
        if (!('MediaSource' in window)) {
          setStatus('error: MediaSource not supported in this browser');
          return;
        }
        if (!MediaSource.isTypeSupported(codecStr)) {
          setStatus(`error: codec not supported: ${codecStr}`);
          return;
        }
        mediaSource = new MediaSource();
        videoEl.src = URL.createObjectURL(mediaSource);
        mediaSource.addEventListener('sourceopen', () => {
          try {
            sourceBuffer = mediaSource.addSourceBuffer(codecStr);
            sourceBuffer.mode = 'sequence';
            pump = createPump({
              sourceBuffer,
              decrypted,
              getLastAppended: () => lastRendered,
              setLastAppended: (n) => { lastRendered = n; },
              onStatus: setStatus,
            });
            sourceBuffer.addEventListener('updateend', pump);
            sourceBuffer.addEventListener('error', (e) => {
              console.error('sourceBuffer error', e);
              setStatus('sourceBuffer error (see console)');
            });
            setStatus(`ready (codec ${codecStr})`);
            pump();
          } catch (e) {
            console.error(e);
            setStatus(`error creating SourceBuffer: ${e.message || e}`);
          }
        }, { once: true });
      }

      // MLS state
      const { member: mls, kind: mlsKind, persist: persistMls } = await createMember(
        `${streamId}:viewer-video:${viewer.pk}`,
        `mls.member.viewer-video.${streamId}.${viewer.pk}`
      );
      let exporterSecretB64 = null;

      async function refreshExporterSecret() {
        try {
          const ctxB64 = b64encode(utf8Bytes(streamId));
          exporterSecretB64 = mls.export_secret('blossom-fire-demo', ctxB64, 32);
          persistMls();
          setStatus(`MLS ready (${mlsKind}) epoch=${mls.group_epoch()}`);
        } catch {
          exporterSecretB64 = null;
        }
      }

      async function tryDecrypt(chunkId) {
        if (decrypted.has(chunkId)) return;
        const a = announced.get(chunkId);
        if (!a) return;
        if (!exporterSecretB64) return;

        const blobHash = a.blobHash;
        const mime = a.mime || 'video/webm';
        const codec = a.codec || mime;

        ensureMse(codec);

        const payload = await blobFetch(blobHash);
        const iv = payload.slice(0, 12);
        const ct = payload.slice(12);
        const keyBytes = await deriveChunkKey(exporterSecretB64, streamId, chunkId);
        const aad = await sha256Bytes(utf8Bytes(`${streamId}:${chunkId}`));
        const pt = await aesGcmDecrypt(keyBytes, iv, ct, { aadBytes: aad });
        decrypted.set(chunkId, pt);
        pump();
      }

      // `pump()` is created once the MSE SourceBuffer exists.

      // Send NIP-17 join request to admin
      try {
        const kp = mls.create_key_package();
        const req = nip17WrapJson(viewer.sk, ADMIN_PUB_HEX, {
          type: 'mls_join',
          streamId,
          role: 'viewer-video',
          kp,
          v: 1,
        });
        await publish(req);
      } catch (e) {
        console.warn('mls join request failed', e);
      }
      setStatus('requested access; waiting for MLS welcome…');

      // Subscribe to announcements
      sub([
        { kinds: [1], '#t': [TAG_DEMO_VIDEO], limit: 500 }
      ], async (ev) => {
        try {
          const dTag = ev.tags.find(t => t[0]==='d');
          if (!dTag || dTag[1] !== streamId) return;
          const idTag = ev.tags.find(t => t[0]==='i');
          const xTag = ev.tags.find(t => t[0]==='x');
          const mTag = ev.tags.find(t => t[0]==='m');
          const cTag = ev.tags.find(t => t[0]==='c');
          if (!idTag || !xTag) return;

          const chunkId = Number(idTag[1]);
          const blobHash = xTag[1];
          const mime = (mTag && mTag[1]) || 'video/webm';
          if (!mime.startsWith('video/')) return;
          const codec = (cTag && cTag[1]) || mime;

          // Ignore older chunks
          if (chunkId <= lastRendered) return;

          announced.set(chunkId, { blobHash, mime, codec });
          await tryDecrypt(chunkId);
        } catch (e) {
          console.error(e);
        }
      });

      // Subscribe to NIP-17 MLS control-plane messages
      sub([
        { kinds: [1059], '#p': [viewer.pk], limit: 200 }
      ], async (ev) => {
        try {
          const { inner, msg } = nip17UnwrapJson(viewer.sk, ev);
          if (!msg || msg.streamId !== streamId) return;
          if (inner.pubkey !== ADMIN_PUB_HEX) return;

          if (msg.type === 'mls_welcome') {
            mls.process_welcome(msg.welcome, msg.commit);
            await refreshExporterSecret();
          } else if (msg.type === 'mls_commit') {
            mls.process_commit(msg.commit);
            await refreshExporterSecret();
          }
        } catch {
          // ignore
        }
      });

      await refreshExporterSecret();

    </script>
  </body>
</html>
