<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Viewer Video</title>
    <style>
      :root { color-scheme: dark; }
      body { font-family: system-ui, sans-serif; margin: 16px; background: #0b0e14; color: #e6edf3; }
      .box { padding: 12px; border: 1px solid #2f3540; border-radius: 10px; background: #111826; }
      .row { display: flex; gap: 12px; flex-wrap: wrap; }
      .meta { display: grid; gap: 8px; }
      .kv { display: flex; justify-content: space-between; gap: 12px; align-items: center; }
      .label { color: #9aa7bd; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
      .value { font-weight: 600; }
      .grid { display: grid; grid-template-columns: 1fr 420px; gap: 16px; align-items: start; }
      @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }
      code { background: #1a2233; color: #d2e0ff; padding: 2px 4px; border-radius: 4px; }
      a { color: #7ab8ff; }
      .small { color: #9aa7bd; font-size: 12px; }
      button, input { font-size: 16px; background: #1a2233; color: #e6edf3; border: 1px solid #3a4354; border-radius: 6px; }
      button { padding: 6px 10px; cursor: pointer; }
      video, canvas, img { max-width: 100%; border: 1px solid #2f3540; border-radius: 8px; background: #000; }
      .viewer { display: flex; justify-content: space-between; align-items: center; gap: 8px; padding: 8px; border-bottom: 1px solid #253043; }
    </style>
  </head>
  <body>
    <h2>Viewer</h2>
    <div class="box meta">
      <div class="kv"><span class="label">Stream</span><span class="value"><code id="stream"></code></span></div>
      <div class="kv"><span class="label">Viewer npub</span><span class="value"><code id="npubShort"></code></span></div>
      <div class="kv"><span class="label">Status</span><span class="value" id="status">starting…</span></div>
      <div class="kv"><span class="label">Key</span><span class="value" id="keyId">—</span></div>
      <div class="kv"><span class="label">Buffer Remaining</span><span class="value" id="bufferSec">0.0s</span></div>
    </div>

    <video id="v" controls autoplay playsinline></video>

    <script type="module">
      import { TAG_REQ, TAG_DEMO_VIDEO, ADMIN_SK_HEX } from './config.js';
      import { blobFetch } from './blob.js';
      import { aesGcmDecrypt, b64decode, utf8Bytes } from './crypto.js';
      import {
        getStreamId,
        getOrCreateViewerKeypair,
        makeSignedEventUnsigned,
        publish,
        sub,
        nip17UnwrapJson,
        nip17WrapJson,
        skFromHex,
        pubkeyFromSk,
      } from './util.js';

      const streamId = (getStreamId() || 'demo1').trim() || 'demo1';
      document.querySelector('#stream').textContent = streamId;

      const viewer = getOrCreateViewerKeypair('demo.viewer.sk');
      const shortNpub = `${viewer.npub.slice(0, 14)}…${viewer.npub.slice(-6)}`;
      document.querySelector('#npubShort').textContent = shortNpub;

      const statusEl = document.querySelector('#status');
      const keyIdEl = document.querySelector('#keyId');
      const bufferEl = document.querySelector('#bufferSec');
      const videoEl = document.querySelector('#v');

      const keys = new Map();      // chunkId -> { keyB64, blobHash, mime }
      const announced = new Map(); // chunkId -> { blobHash, mime }
      const appended = new Set();
      let currentKeyB64 = null;
      let currentKeyId = null;
      let expectedChunkId = 0;

      function setStatus(s) { statusEl.textContent = s; }

      // Auto-request access (kind1 + NIP-17 fallback)
      const req = makeSignedEventUnsigned(1, viewer.sk, {
        content: 'request-video',
        tags: [ ['t', TAG_REQ], ['d', streamId] ]
      });
      await publish(req);
      try {
        const adminPub = pubkeyFromSk(skFromHex(ADMIN_SK_HEX));
        const dm = await nip17WrapJson(viewer.sk, adminPub, {
          type: 'access_req',
          streamId,
          role: 'viewer-video',
          v: 1,
        });
        await publish(dm);
      } catch {}
      setStatus('requested access; waiting for video keys…');

      // MSE setup
      const mimeCandidates = [
        'video/webm; codecs="vp8"',
        'video/webm; codecs="vp9"',
        'video/webm; codecs="vp8,opus"',
        'video/webm; codecs="vp9,opus"',
        'video/webm'
      ];
      const mseMime = mimeCandidates.find(m => MediaSource.isTypeSupported(m));
      if (!mseMime) {
        setStatus('error: browser does not support MSE WebM');
      }

      let ms = null;
      let sb = null;
      const queue = [];
      const TARGET_BUFFER_SEC = 16;
      const REBUFFER_RESUME_SEC = 16;
      let startedPlayback = false;
      let hasPlayedOnce = false;
      let mseFailures = 0;
      let fallbackMode = false;
      let currentObjectUrl = null;

      function resetPipeline(reason = 'reset') {
        if (fallbackMode) return;
        try {
          if (sb && sb.updating) {
            try { sb.abort(); } catch {}
          }
        } catch {}
        sb = null;
        queue.length = 0;
        startedPlayback = false;
        ms = new MediaSource();
        videoEl.src = URL.createObjectURL(ms);
        setStatus(`${reason}… waiting for next chunks`);

        ms.addEventListener('sourceopen', () => {
          if (!mseMime) return;
          if (sb) return;
          sb = ms.addSourceBuffer(mseMime);
          sb.mode = 'sequence';
          sb.addEventListener('updateend', async () => {
            pump();
            await maybeStartPlayback();
          });
          pump();
        }, { once: true });
      }

      async function playFallbackChunk(bytes, mime = 'video/webm') {
        try {
          if (currentObjectUrl) {
            try { URL.revokeObjectURL(currentObjectUrl); } catch {}
            currentObjectUrl = null;
          }
          const blob = new Blob([bytes], { type: mime });
          currentObjectUrl = URL.createObjectURL(blob);
          videoEl.src = currentObjectUrl;
          await videoEl.play().catch(() => {});
          setStatus('fallback mode: playing latest chunk');
        } catch (e) {
          setStatus(`fallback error: ${e.message || e}`);
        }
      }

      async function handleDecodedChunk(bytes, mime = 'video/webm') {
        if (fallbackMode) {
          await playFallbackChunk(bytes, mime);
          return;
        }
        enqueue(bytes);
      }

      resetPipeline('init');

      function enqueue(bytes) {
        queue.push(bytes);
        pump();
      }

      function bufferedAheadSec() {
        try {
          const b = videoEl.buffered;
          if (!b || b.length === 0) return 0;
          const end = b.end(b.length - 1);
          const cur = Number.isFinite(videoEl.currentTime) ? videoEl.currentTime : 0;
          return Math.max(0, end - cur);
        } catch {
          return 0;
        }
      }

      function updateBufferUi() {
        const sec = bufferedAheadSec();
        bufferEl.textContent = `${sec.toFixed(1)}s`;
      }

      async function maybeStartPlayback() {
        if (startedPlayback) return;
        const need = hasPlayedOnce ? REBUFFER_RESUME_SEC : TARGET_BUFFER_SEC;
        if (bufferedAheadSec() < need) return;
        try {
          await videoEl.play();
          startedPlayback = true;
          hasPlayedOnce = true;
          setStatus(`playing (buffer ~${Math.round(bufferedAheadSec())}s)`);
        } catch {}
      }

      function pump() {
        if (!sb || sb.updating) return;
        if (queue.length === 0) return;
        const next = queue.shift();
        try {
          sb.appendBuffer(next);
        } catch (e) {
          console.error(e);
          const msg = String((e && e.message) || e || '');
          if (
            msg.includes('no longer usable') ||
            msg.includes('is not, or is no longer, usable') ||
            msg.includes('Timecode element must appear before any Block')
          ) {
            mseFailures += 1;
            if (mseFailures >= 3) {
              fallbackMode = true;
              setStatus('switching to fallback mode (latest chunk playback)');
            } else {
              resetPipeline('pipeline recovered');
            }
          }
        }
      }

      // Subscribe to chunk announcements
      sub([
        { kinds: [1], '#t': [TAG_DEMO_VIDEO], '#d': [streamId], limit: 200 }
      ], async (ev) => {
        try {
          const chunkIdTag = ev.tags.find(t => t[0] === 'i');
          const blobTag = ev.tags.find(t => t[0] === 'x');
          const mimeTag = ev.tags.find(t => t[0] === 'm');
          if (!chunkIdTag || !blobTag) return;

          const chunkId = Number(chunkIdTag[1]);
          const blobHash = blobTag[1];
          const mime = (mimeTag && mimeTag[1]) || 'video/webm';
          const encTag = ev.tags.find(t => t[0] === 'enc');
          const enc = (encTag && encTag[1]) || null;

          announced.set(chunkId, { blobHash, mime, enc });
          await tryAppend(chunkId);
        } catch (e) {
          console.error(e);
        }
      });

      // Subscribe to NIP-17 key DMs
      sub([
        { kinds: [1059], '#p': [viewer.pk], limit: 500 }
      ], async (ev) => {
        try {
          const { msg } = nip17UnwrapJson(viewer.sk, ev);
          if (!msg || msg.type !== 'viewerkey') return;
          if (msg.streamId !== streamId) return;

          if (msg.k) currentKeyB64 = msg.k;
          if (msg.key_id) currentKeyId = msg.key_id;
          keyIdEl.textContent = currentKeyId || '—';

          keys.set(Number(msg.frameId), {
            keyB64: msg.k || currentKeyB64,
            blobHash: msg.x,
            mime: msg.m || 'video/webm',
            enc: msg.enc || null,
          });
          setStatus(`allowed; got key meta for chunk ${msg.frameId}`);
          await tryAppend(Number(msg.frameId));
        } catch {}
      });

      async function appendOne(chunkId) {
        if (appended.has(chunkId)) return false;
        const k = keys.get(chunkId);
        const a = announced.get(chunkId);
        if (!k) return false; // access control: require admin viewerkey for each chunk

        const blobHash = k?.blobHash || a?.blobHash;
        if (!blobHash) return false;
        const payload = await blobFetch(blobHash);

        const plain = (k?.enc === 'none') || (a?.enc === 'none');
        if (plain) {
          const mime = k?.mime || a?.mime || 'video/webm';
          await handleDecodedChunk(payload, mime);
          mseFailures = 0;
          appended.add(chunkId);
          await maybeStartPlayback();
          return true;
        }

        if (!k.keyB64) return false;
        const iv = payload.slice(0, 12);
        const ct = payload.slice(12);
        const keyBytes = b64decode(k.keyB64);
        const aad = utf8Bytes(`${streamId}:${chunkId}`);

        try {
          const pt = await aesGcmDecrypt(keyBytes, iv, ct, { aadBytes: aad });
          const mime = k?.mime || a?.mime || 'video/webm';
          await handleDecodedChunk(pt, mime);
          mseFailures = 0;
          appended.add(chunkId);
          await maybeStartPlayback();
          return true;
        } catch (e) {
          const msg = String((e && e.message) || e || '');
          if (msg.includes('Timecode element must appear before any Block')) {
            resetPipeline('decoder resync');
            setStatus('decoder resyncing…');
            return false;
          }
          setStatus('have blob but not allowed (or wrong key)');
          return false;
        }
      }

      function nextCandidateChunkId() {
        const ids = new Set([...announced.keys(), ...keys.keys()]);
        const sorted = [...ids].sort((a, b) => a - b);
        for (const id of sorted) {
          if (id < expectedChunkId) continue;
          if (appended.has(id)) continue;
          if (!keys.get(id)) continue; // still require access control token
          return id;
        }
        return null;
      }

      async function tryAppend(_chunkId) {
        // Append in-order when possible; if viewer joined mid-stream, fast-forward to first authorized chunk.
        while (true) {
          const progressed = await appendOne(expectedChunkId);
          if (progressed) {
            expectedChunkId += 1;
            continue;
          }

          const candidate = nextCandidateChunkId();
          if (candidate == null) break;
          if (candidate === expectedChunkId) break;

          expectedChunkId = candidate;
          setStatus(`syncing from chunk ${expectedChunkId}…`);
        }
      }

      videoEl.addEventListener('waiting', () => {
        const sec = Math.round(bufferedAheadSec());
        if (fallbackMode) {
          setStatus(`fallback mode: waiting for next chunk (${sec}s buffered)`);
          return;
        }
        // Gate resume until we have enough headroom again.
        startedPlayback = false;
        setStatus(`buffering… (${sec}s buffered)`);
      });
      videoEl.addEventListener('playing', () => {
        const sec = Math.round(bufferedAheadSec());
        setStatus(`playing (${sec}s buffered)`);
      });

      setInterval(updateBufferUi, 500);
      updateBufferUi();

      setStatus('requested access; waiting…');
    </script>
  </body>
</html>
