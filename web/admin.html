<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin</title>
    <style>
      :root { color-scheme: dark; }
      body { font-family: system-ui, sans-serif; margin: 16px; background: #0b0e14; color: #e6edf3; }
      .box { padding: 12px; border: 1px solid #2f3540; border-radius: 8px; background: #111826; }
      .row { display: flex; gap: 16px; flex-wrap: wrap; }
      .grid { display: grid; grid-template-columns: 1fr 420px; gap: 16px; align-items: start; }
      @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }
      code { background: #1a2233; color: #d2e0ff; padding: 2px 4px; border-radius: 4px; }
      a { color: #7ab8ff; }
      .small { color: #9aa7bd; font-size: 12px; }
      button, input { font-size: 16px; background: #1a2233; color: #e6edf3; border: 1px solid #3a4354; border-radius: 6px; }
      button { padding: 6px 10px; cursor: pointer; }
      video, canvas, img { max-width: 100%; border: 1px solid #2f3540; border-radius: 8px; background: #000; }
      .viewer { display: flex; justify-content: space-between; align-items: center; gap: 8px; padding: 8px; border-bottom: 1px solid #253043; }
    </style>
  </head>
  <body>
    <h2>Admin (toggle viewer access)</h2>

    <div class="grid">
      <div class="box">
        <div class="row">
          <div>Stream: <code id="stream"></code></div>
          <div>Admin npub: <code id="adminNpub"></code></div>
          <div>Status: <span id="status">connecting…</span></div>
        </div>
        <div style="margin-top:10px;">
          <div class="small">Live preview (decrypting like a viewer, using admin-delivered keys)</div>
          <img id="preview" />
        </div>
      </div>

      <div class="box">
        <div class="row" style="justify-content: space-between;">
          <div><b>Viewers</b></div>
          <button id="clear">Clear list</button>
        </div>
        <div class="small">When ON, admin forwards keys for new frames to that viewer.</div>
        <div id="viewers"></div>
      </div>
    </div>

    <script type="module">
      import { TAG_REQ, ADMIN_SK_HEX } from './config.js';
      import { blobFetch } from './blob.js';
      import { aesGcmDecrypt, b64decode, utf8Bytes } from './crypto.js';
      import {
        getStreamId,
        skFromHex,
        pubkeyFromSk,
        npubFromPubkey,
        publish,
        sub,
        nip17UnwrapJson,
        nip17WrapJson,
      } from './util.js';

      const streamId = getStreamId();
      document.querySelector('#stream').textContent = streamId;

      const adminSk = skFromHex(ADMIN_SK_HEX);
      const adminPub = pubkeyFromSk(adminSk);
      document.querySelector('#adminNpub').textContent = npubFromPubkey(adminPub);

      const statusEl = document.querySelector('#status');
      const viewersEl = document.querySelector('#viewers');
      const previewEl = document.querySelector('#preview');

      // viewerPubkeyHex -> { allowed, lastSeen, npub }
      const viewers = new Map();

      // frameId -> { keyBytes, blobHash, mime }
      const adminFrameKeys = new Map();

      function setStatus(s) { statusEl.textContent = s; }

      function renderViewers() {
        viewersEl.innerHTML = '';
        const entries = Array.from(viewers.entries())
          .sort((a,b) => (b[1].lastSeen||0)-(a[1].lastSeen||0));

        for (const [pub, v] of entries) {
          const row = document.createElement('div');
          row.className = 'viewer';

          const left = document.createElement('div');
          left.innerHTML = `<div><code>${v.npub}</code></div><div class="small">last: ${new Date((v.lastSeen||0)*1000).toLocaleTimeString()}</div>`;

          const right = document.createElement('div');
          right.className = 'row';

          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = !!v.allowed;
          cb.onchange = () => {
            v.allowed = cb.checked;
            v.lastSeen = Math.floor(Date.now()/1000);
            viewers.set(pub, v);
          };

          right.appendChild(document.createTextNode('allow '));
          right.appendChild(cb);

          row.appendChild(left);
          row.appendChild(right);
          viewersEl.appendChild(row);
        }
      }

      document.querySelector('#clear').onclick = () => {
        viewers.clear();
        renderViewers();
      };

      // Subscribe to access requests (public)
      sub([
        {
          kinds: [1],
          '#t': [TAG_REQ],
          limit: 200,
        }
      ], (ev) => {
        const dTag = ev.tags.find(t => t[0] === 'd');
        if (!dTag || dTag[1] !== streamId) return;

        const pub = ev.pubkey;
        if (!viewers.has(pub)) {
          viewers.set(pub, { allowed: false, lastSeen: ev.created_at, npub: npubFromPubkey(pub) });
          renderViewers();
        } else {
          const v = viewers.get(pub);
          v.lastSeen = ev.created_at;
          viewers.set(pub, v);
          renderViewers();
        }
      });

      // Subscribe to broadcaster→admin key DMs (NIP-17 gift-wrap kind 1059)
      sub([
        {
          kinds: [1059],
          '#p': [adminPub],
          limit: 500,
        }
      ], async (ev) => {
        try {
          const { inner, msg } = nip17UnwrapJson(adminSk, ev);
          if (!msg || msg.streamId !== streamId) return;

          if (msg.type === 'access_req') {
            const pub = inner.pubkey;
            if (!viewers.has(pub)) {
              viewers.set(pub, { allowed: false, lastSeen: ev.created_at, npub: npubFromPubkey(pub) });
            } else {
              const v = viewers.get(pub);
              v.lastSeen = ev.created_at;
              viewers.set(pub, v);
            }
            renderViewers();
            return;
          }

          if (msg.type !== 'adminkey') return;

          const frameId = Number(msg.frameId);
          const blobHash = msg.x;
          const keyBytes = b64decode(msg.k);
          const mime = msg.m || 'image/webp';

          adminFrameKeys.set(frameId, { keyBytes, blobHash, mime });

          // Live preview
          await tryRenderPreview(frameId);

          // Forward key to allowed viewers
          for (const [viewerPub, v] of viewers.entries()) {
            if (!v.allowed) continue;
            const dm = await nip17WrapJson(adminSk, viewerPub, {
              type: 'viewerkey',
              streamId,
              frameId,
              x: blobHash,
              k: msg.k,
              m: mime,
              alg: msg.alg || 'aes-gcm',
              v: 1,
            });
            publish(dm); // don't await each
          }

          setStatus(`got key for frame ${frameId} from ${npubFromPubkey(inner.pubkey)}`);
        } catch (e) {
          console.error(e);
          setStatus(`error decrypting adminkey dm: ${e.message || e}`);
        }
      });

      async function tryRenderPreview(frameId) {
        const rec = adminFrameKeys.get(frameId);
        if (!rec) return;
        const payload = await blobFetch(rec.blobHash);
        const iv = payload.slice(0, 12);
        const ct = payload.slice(12);
        const aad = utf8Bytes(`${streamId}:${frameId}`);
        const pt = await aesGcmDecrypt(rec.keyBytes, iv, ct, { aadBytes: aad });
        const blob = new Blob([pt], { type: rec.mime });
        previewEl.src = URL.createObjectURL(blob);
      }

      setStatus('ready');
    </script>
  </body>
</html>
