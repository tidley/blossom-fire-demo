<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 16px; }
      .grid { display: grid; grid-template-columns: 1fr 420px; gap: 16px; align-items: start; }
      @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }
      .box { padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
      code { background: #f2f2f2; padding: 2px 4px; border-radius: 4px; }
      button { font-size: 16px; }
      .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      .viewer { display: flex; justify-content: space-between; align-items: center; gap: 8px; padding: 8px; border-bottom: 1px solid #eee; }
      .small { color: #666; font-size: 12px; }
      img { width: 100%; max-width: 720px; border: 1px solid #ddd; border-radius: 8px; }
      input[type=checkbox] { transform: scale(1.3); }
    </style>
  </head>
  <body>
    <h2>Admin (toggle viewer access)</h2>

    <div class="grid">
      <div class="box">
        <div class="row">
          <div>Stream: <code id="stream"></code></div>
          <div>Admin npub: <code id="adminNpub"></code></div>
          <div>Status: <span id="status">connecting…</span></div>
        </div>
        <div style="margin-top:10px;">
          <div class="row">
            <div class="small">Live preview (decrypting like a viewer, using admin-delivered keys)</div>
            <label class="small" style="margin-left:auto; display:flex; align-items:center; gap:8px;">
              <input id="previewVideo" type="checkbox" /> Preview video
            </label>
          </div>
          <img id="preview" />
          <video id="previewVid" controls autoplay playsinline muted style="display:none; width:100%; max-width:720px; margin-top:12px;"></video>
        </div>
      </div>

      <div class="box">
        <div class="row" style="justify-content: space-between;">
          <div><b>Viewers</b></div>
          <button id="clear">Clear list</button>
        </div>
        <div class="small">When ON, admin forwards keys for new frames to that viewer.</div>
        <div id="viewers"></div>
      </div>
    </div>

    <script type="module">
      import { TAG_REQ, TAG_DEMO, ADMIN_SK_HEX } from './config.js';
      import { blobFetch } from './blob.js';
      import { aesGcmDecrypt, utf8Bytes, sha256Bytes, b64encode } from './crypto.js';
      import { deriveChunkKey } from './deriveChunkKey.js';
      import { createAdmin } from './mls.js';
      import {
        getStreamId,
        skFromHex,
        pubkeyFromSk,
        npubFromPubkey,
        makeSignedEventUnsigned,
        publish,
        sub,
        nip44Encrypt,
      } from './util.js';

      const streamId = getStreamId();
      document.querySelector('#stream').textContent = streamId;

      const adminSk = skFromHex(ADMIN_SK_HEX);
      const adminPub = pubkeyFromSk(adminSk);
      document.querySelector('#adminNpub').textContent = npubFromPubkey(adminPub);

      const statusEl = document.querySelector('#status');
      const viewersEl = document.querySelector('#viewers');
      const previewEl = document.querySelector('#preview');
      const previewVideoToggle = document.querySelector('#previewVideo');
      const previewVidEl = document.querySelector('#previewVid');
      previewVideoToggle.disabled = true; // video path not wired for MLS yet
      previewVidEl.style.display = 'none';

      const { admin: mlsAdmin, kind: mlsKind, persist: persistAdmin } = await createAdmin(
        streamId,
        `mls.admin.${streamId}`
      );

      let exporterSecretB64 = null;
      function refreshExporterSecret() {
        try {
          const ctxB64 = b64encode(utf8Bytes(streamId));
          exporterSecretB64 = mlsAdmin.export_secret('blossom-fire-demo', ctxB64, 32);
          persistAdmin();
        } catch {
          exporterSecretB64 = null;
        }
      }

      // viewerPubkeyHex -> { allowed, lastSeen, npub, kp, role, joined }
      const viewers = new Map();

      // frameId -> { blobHash, mime }
      const announced = new Map();

      function setStatus(s) { statusEl.textContent = s; }

      function renderViewers() {
        viewersEl.innerHTML = '';
        const entries = Array.from(viewers.entries())
          .sort((a,b) => (b[1].lastSeen||0)-(a[1].lastSeen||0));

        for (const [pub, v] of entries) {
          const row = document.createElement('div');
          row.className = 'viewer';

          const left = document.createElement('div');
          const extra = v.role ? ` (${v.role})` : '';
          const joined = v.joined ? 'joined' : 'not joined';
          const hasKp = v.kp ? 'kp' : 'no-kp';
          left.innerHTML = `<div><code>${v.npub}</code>${extra}</div><div class="small">${joined} · ${hasKp} · last: ${new Date((v.lastSeen||0)*1000).toLocaleTimeString()}</div>`;

          const right = document.createElement('div');
          right.className = 'row';

          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = !!v.allowed;
          cb.onchange = async () => {
            v.allowed = cb.checked;
            v.lastSeen = Math.floor(Date.now()/1000);
            viewers.set(pub, v);
            renderViewers();
            if (v.allowed && !v.joined) {
              await tryWelcome(pub);
            }
          };

          right.appendChild(document.createTextNode('allow '));
          right.appendChild(cb);

          row.appendChild(left);
          row.appendChild(right);
          viewersEl.appendChild(row);
        }
      }

      document.querySelector('#clear').onclick = () => {
        viewers.clear();
        renderViewers();
      };

      async function dm(toPub, payloadObj) {
        const enc = nip44Encrypt(adminSk, toPub, JSON.stringify(payloadObj));
        const ev = makeSignedEventUnsigned(4, adminSk, {
          content: enc,
          tags: [ ['p', toPub], ['d', streamId] ]
        });
        await publish(ev);
      }

      async function tryWelcome(pub) {
        const v = viewers.get(pub);
        if (!v?.kp) {
          setStatus('cannot add member: missing key package (reload viewer/broadcast and try again)');
          return;
        }
        try {
          const outJson = mlsAdmin.add_member(v.kp);
          const out = JSON.parse(outJson);
          persistAdmin();
          refreshExporterSecret();

          // Send Welcome+Commit to the new member.
          await dm(pub, { type: 'mls_welcome', streamId, welcome: out.welcome, commit: out.commit, epoch: out.epoch, v: 1 });

          // Send Commit to all existing allowed members (so they advance epoch).
          for (const [p, rec] of viewers.entries()) {
            if (!rec.allowed) continue;
            if (p === pub) continue;
            await dm(p, { type: 'mls_commit', streamId, commit: out.commit, epoch: out.epoch, v: 1 });
          }

          v.joined = true;
          viewers.set(pub, v);
          renderViewers();
          setStatus(`added member ${v.npub}; MLS epoch=${mlsAdmin.group_epoch()} (${mlsKind})`);
        } catch (e) {
          console.error(e);
          setStatus(`add_member error: ${e.message || e}`);
        }
      }

      // Subscribe to public access/join requests
      sub([
        {
          kinds: [1],
          '#t': [TAG_REQ],
          limit: 200,
        }
      ], (ev) => {
        const d = ev.tags.find(t => t[0] === 'd');
        if (!d || d[1] !== streamId) return;
        const pub = ev.pubkey;

        let kp = null;
        let role = null;
        try {
          const c = JSON.parse(ev.content || '{}');
          if (c?.t === 'mls_join') {
            kp = c.kp || null;
            role = c.role || null;
          }
        } catch {}

        const existing = viewers.get(pub) || { allowed: false, joined: false, npub: npubFromPubkey(pub) };
        viewers.set(pub, {
          ...existing,
          lastSeen: ev.created_at,
          kp: kp || existing.kp,
          role: role || existing.role,
        });
        renderViewers();
      });

      // Subscribe to frame announcements + decrypt for preview using MLS exporter
      sub([
        { kinds: [1], '#t': [TAG_DEMO], '#d': [streamId], limit: 100 }
      ], async (ev) => {
        try {
          const frameIdTag = ev.tags.find(t => t[0]==='i');
          const blobTag = ev.tags.find(t => t[0]==='x');
          const mimeTag = ev.tags.find(t => t[0]==='m');
          if (!frameIdTag || !blobTag) return;
          const frameId = Number(frameIdTag[1]);
          const blobHash = blobTag[1];
          const mime = (mimeTag && mimeTag[1]) || 'image/webp';
          announced.set(frameId, { blobHash, mime });

          if (!exporterSecretB64) refreshExporterSecret();
          if (!exporterSecretB64) return;

          const payload = await blobFetch(blobHash);
          const iv = payload.slice(0, 12);
          const ct = payload.slice(12);
          const aad = await sha256Bytes(utf8Bytes(`${streamId}:${frameId}`));
          const key = await deriveChunkKey(exporterSecretB64, streamId, frameId);
          const pt = await aesGcmDecrypt(key, iv, ct, { aadBytes: aad });
          const blob = new Blob([pt], { type: mime });
          previewEl.src = URL.createObjectURL(blob);
          setStatus(`preview frame ${frameId} (MLS epoch=${mlsAdmin.group_epoch()} ${mlsKind})`);
        } catch (e) {
          // epoch mismatch or not joined broadcaster yet
        }
      });

      refreshExporterSecret();
      setStatus(`ready (MLS=${mlsKind} epoch=${mlsAdmin.group_epoch()})`);
    </script>
  </body>
</html>
