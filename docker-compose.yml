services:
  relay:
    image: ghcr.io/scsibug/nostr-rs-relay:latest
    container_name: nostr-relay
    ports:
      - "8080:8080"
    volumes:
      - ./relay:/config
      - ./data/relay:/data
    environment:
      - RUST_LOG=info
    command: ["--config", "/config/config.toml"]

  blob:
    image: node:20-alpine
    container_name: blob-server
    working_dir: /app
    volumes:
      - ./blob:/app
      - ./data/blobs:/data/blobs
    environment:
      - BLOB_DIR=/data/blobs
      - PORT=3000
    ports:
      - "3000:3000"
    command: ["node", "server.js"]

  web:
    image: caddy:2
    container_name: demo-web
    ports:
      - "5173:80"
    volumes:
      - ./web:/usr/share/caddy:ro
